# =============================================================================
# KOSMO OS — GRUB2 Configuration
# Archivo : iso/grub/grub.cfg
# Función : Menú de arranque de GRUB2 para la ISO de Kosmo OS.
#           Compatible con Rufus, Ventoy, QEMU y VirtualBox.
# =============================================================================

# Tiempo de espera antes de arrancar automáticamente (segundos)
set timeout=5

# Entrada por defecto (0 = primera)
set default=0

# Tema visual básico
set color_normal=light-gray/black
set color_highlight=white/blue

# Mostrar menú siempre
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

# =============================================================================
# Entrada 1: Kosmo OS (modo normal)
# =============================================================================
menuentry "Kosmo OS v0.1" {
    echo "Loading Kosmo OS kernel..."

    # Cargar el kernel ELF/binario con protocolo Multiboot
    # El kernel está en /boot/kernel.bin dentro de la ISO
    multiboot /boot/kernel.bin

    # Módulos adicionales (ramdisk, etc.) — descomenta cuando los tengas
    # module /boot/initrd.img

    echo "Booting..."
    boot
}

# =============================================================================
# Entrada 2: Kosmo OS — Modo texto (sin GUI)
# =============================================================================
menuentry "Kosmo OS v0.1 (Text Mode)" {
    echo "Loading Kosmo OS in text mode..."
    multiboot /boot/kernel.bin textmode
    boot
}

# =============================================================================
# Entrada 3: Kosmo OS — Modo seguro (baja resolución)
# =============================================================================
menuentry "Kosmo OS v0.1 (Safe Mode - 640x480)" {
    echo "Loading Kosmo OS in safe mode..."
    multiboot /boot/kernel.bin safemode vga=640x480
    boot
}

# =============================================================================
# Entrada 4: Herramientas de memoria (memtest si está disponible)
# =============================================================================
menuentry "Memory Test (memtest86+)" {
    if [ -f /boot/memtest86+.bin ]; then
        linux16 /boot/memtest86+.bin
    else
        echo "memtest86+ not found."
        sleep 3
    fi
}

# =============================================================================
# Entrada 5: Reiniciar
# =============================================================================
menuentry "Reboot" {
    reboot
}

# =============================================================================
# Entrada 6: Apagar
# =============================================================================
menuentry "Power Off" {
    halt
}
