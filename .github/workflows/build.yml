name: Build Kosmo OS ISO

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm gcc binutils grub-pc-bin xorriso mtools

      - name: Build ISO
        run: make all

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kosmo-os-iso
          path: build/kosmo-os.iso
